drone-punch-lines:
  - "<#AA00FF>✦ <white>Дрон: <gray>Эй, не дерись! Получай ответку."
  - "<#AA00FF>✦ <white>Дрон: <gray>Эй, ты офигел? Дроны милые — их нельзя обижать!"
  - "<#AA00FF>✦ <white>Дрон: <gray>АЛО... кто тут у нас буйный? Я тоже драться умею!"
  - "<#AA00FF>✦ <white>Дрон: <gray>Бз-з-з... это было некультурно. Держи взамен."
  - "<#AA00FF>✦ <white>Дрон: <gray>Я посылочный, а не груша для битья!"
  - "<#AA00FF>✦ <white>Дрон: <gray>Один раз ударил — второй раз уже с характером."
  - "<#AA00FF>✦ <white>Дрон: <gray>Ты по мне? Я по тебе. Справедливо."
  - "<#AA00FF>✦ <white>Дрон: <gray>Я маленький, но злой. Очень злой."
  - "<#AA00FF>✦ <white>Дрон: <gray>Руки прочь от корпуса! Я чувствительный."
  - "<#AA00FF>✦ <white>Дрон: <gray>Ты что, с моей мамой пчелой дрался?"
  - "<#AA00FF>✦ <white>Дрон: <gray>У меня внутри чужие вещи — не трогай!"
  - "<#AA00FF>✦ <white>Дрон: <gray>Хватит! Я летаю, а ты стоишь — подумай."
  - "<#AA00FF>✦ <white>Дрон: <gray>Следующий удар — жалю в ответ. Шучу. Не шучу."
  - "<#AA00FF>✦ <white>Дрон: <gray>Я дрон, не тренировочный манекен!"
  - "<#AA00FF>✦ <white>Дрон: <gray>Ты отправитель? Получатель? Неважно — не бей."
  - "<#AA00FF>✦ <white>Дрон: <gray>Мой корпус — фиолетовый, а не красный от твоих ударов."
  - "<#AA00FF>✦ <white>Дрон: <gray>Жужжу недовольно. Очень недовольно."
  - "<#AA00FF>✦ <white>Дрон: <gray>Посылка хрупкая. Я — тоже."
  - "<#AA00FF>✦ <white>Дрон: <gray>Хочешь драки? У меня четыре вентилятора и обида."
  - "<#AA00FF>✦ <white>Дрон: <gray>Удар принят. Контрудар отправлен."
  - "<#AA00FF>✦ <white>Дрон: <gray>Я не кричу — я жужжу громко. Понял?"
