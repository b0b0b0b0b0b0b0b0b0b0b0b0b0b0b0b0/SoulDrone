drone-punch-lines:
  - "<#AA00FF>✦ <white>Drone: <gray>Hey, no fighting! Take this back."
  - "<#AA00FF>✦ <white>Drone: <gray>Are you serious? Drones are cute — hands off!"
  - "<#AA00FF>✦ <white>Drone: <gray>HELLO? Who's getting rowdy? I fight back too!"
  - "<#AA00FF>✦ <white>Drone: <gray>Bzzzz... that was rude. Have a taste of your own."
  - "<#AA00FF>✦ <white>Drone: <gray>I'm a courier, not a punching bag!"
  - "<#AA00FF>✦ <white>Drone: <gray>First hit free. Second hit — my rules."
  - "<#AA00FF>✦ <white>Drone: <gray>You hit me? I hit back. Fair."
  - "<#AA00FF>✦ <white>Drone: <gray>Small drone, big attitude."
  - "<#AA00FF>✦ <white>Drone: <gray>Keep your fists off my chassis!"
  - "<#AA00FF>✦ <white>Drone: <gray>I carry fragile goods — and fragile feelings."
  - "<#AA00FF>✦ <white>Drone: <gray>Enough! I fly, you stand — think about it."
  - "<#AA00FF>✦ <white>Drone: <gray>Next punch stings. Literally."
  - "<#AA00FF>✦ <white>Drone: <gray>Training dummy? No. Delivery drone? Yes."
  - "<#AA00FF>✦ <white>Drone: <gray>Sender, receiver, stranger — don't punch me."
  - "<#AA00FF>✦ <white>Drone: <gray>My paint is purple, not bruise-colored."
  - "<#AA00FF>✦ <white>Drone: <gray>Buzzing angrily. Very angrily."
  - "<#AA00FF>✦ <white>Drone: <gray>Package is fragile. So am I."
  - "<#AA00FF>✦ <white>Drone: <gray>Four fans and a grudge. Remember that."
  - "<#AA00FF>✦ <white>Drone: <gray>Hit registered. Counter-hit delivered."
  - "<#AA00FF>✦ <white>Drone: <gray>I don't yell — I buzz loud. Got it?"
