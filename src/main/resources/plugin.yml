name: SoulDrone
version: '${version}'
main: bm.b0b0b0.soulDrone.SoulDrone
api-version: '1.21'
authors: [ b0b0b0 ]

softdepend:
  - Vault
  - Essentials
  - WorldGuard

libraries:
  - net.elytrium:serializer:1.1.1
  - com.zaxxer:HikariCP:5.1.0
  - org.xerial:sqlite-jdbc:3.45.3.0

commands:
  drone:
    description: Send a package via delivery drone
    aliases: [ send, posylka ]
    usage: /drone <player|accept|deny|toggle|claim|refuse|reload>

permissions:
  soulDrone.send:
    description: Allows /drone command
    default: true
  soulDrone.accept:
    description: Allows /drone accept
    default: true
  soulDrone.deny:
    description: Allows /drone deny
    default: true
  soulDrone.toggle:
    description: Allows /drone toggle
    default: true
  soulDrone.open:
    description: Allows opening cargo menu on sender drone
    default: true
  soulDrone.receive:
    description: Allows picking up packages from delivery drone
    default: true
  soulDrone.bypass-cost:
    description: Bypass Vault delivery cost
    default: op
  soulDrone.bypass-zones:
    description: Bypass blocked worlds and regions for drones
    default: op
  soulDrone.reload:
    description: Reload SoulDrone config, GUI settings and lang files
    default: op
